
# Loads default set of integrations. Do not remove.
default_config:

# ── Irrigation Grow Pack ──────────────────────────────────────────────────────
# Packages directory – load all subdirectory YAML files as packages.
# Each subdirectory key becomes a package namespace.
# See: https://www.home-assistant.io/docs/configuration/packages/
homeassistant:
  packages: !include_dir_named packages

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

lovelace:
  mode: storage
  dashboards:
    irrigation:
      mode: yaml
      title: Irrigation
      icon: mdi:sprinkler
      show_in_sidebar: true
      filename: dashboards/legacy_irrigation.yaml
    crop-steering:
      mode: yaml
      title: Crop Steering AI
      icon: mdi:brain
      show_in_sidebar: true
      filename: dashboards/crop_steering.yaml
    co2-environment:
      mode: yaml
      title: CO2 & Environment
      icon: mdi:molecule-co2
      show_in_sidebar: true
      filename: dashboards/co2_environment.yaml

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.30.33.0/24

template:
  - trigger:
      - trigger: time_pattern
        minutes: "/1"
    sensor:
      - name: "Grow Room Light Timer"
        unique_id: grow_room_light_timer
        icon: >
          {% set now_m = now().hour * 60 + now().minute %}
          {% if now_m >= 480 and now_m < 1200 %}
            mdi:lightbulb-on
          {% else %}
            mdi:lightbulb-off
          {% endif %}
        state: >
          {% set now_m = now().hour * 60 + now().minute %}
          {% set on_m = 480 %}
          {% set off_m = 1200 %}
          {% if now_m >= on_m and now_m < off_m %}
            {% set remain = off_m - now_m %}
            {% set h = remain // 60 %}
            {% set m = remain % 60 %}
            Lights OFF in {{ h }}h {{ m }}m
          {% else %}
            {% if now_m >= off_m %}
              {% set remain = 1440 - now_m + on_m %}
            {% else %}
              {% set remain = on_m - now_m %}
            {% endif %}
            {% set h = remain // 60 %}
            {% set m = remain % 60 %}
            Lights ON in {{ h }}h {{ m }}m
          {% endif %}
