    - type: gauge
      entity: sensor.crop_steering_zone_2_ec
      name: Z2 EC
      min: 0
      max: 12
      needle: true
      severity: *id002
  - type: markdown
    content: |-
      {% set vwc = states('sensor.crop_steering_zone_3_vwc')|float(0) %}
      {% set ec = states('sensor.crop_steering_zone_3_ec')|float(0) %}
      {% set fl = states('number.crop_steering_zone_3_p2_vwc_threshold')|float(0) %}
      {% set fc = states('number.crop_steering_field_capacity')|float(60) %}
      {% set tgt = states('number.crop_steering_zone_3_p1_target_vwc')|float(0) %}
      {% set ecmax = states('number.crop_steering_irrigation_ec_max')|float(3.5) %}
      {% set vc = '#fbbf24' if vwc<fl else ('#60a5fa' if vwc>fc else '#34d399') %}
      {% set ecc = '#f87171' if ec>ecmax else '#34d399' %}
      #### Zone 3 &middot; <font color="#5d6b88">{{ states('sensor.crop_steering_zone_3_status') }}</font>
      <font color="{{vc}}">**VWC {{ vwc }}%**</font> {% if vwc<fl %}({{ (fl-vwc)|round(1) }} below floor {{fl}}){% elif vwc>fc %}({{ (vwc-fc)|round(1) }} above FC){% else %}(in band, floor {{fl}}-FC {{fc}}, target {{tgt}}){% endif %} &nbsp; <font color="{{ecc}}">**EC {{ ec }}**</font> {% if ec>ecmax %}**OVER MAX**{% endif %} &middot; probe {{ states('sensor.veg_sdi12_vwc') }} / {{ states('sensor.veg_sdi12_ec') }}
  - type: horizontal-stack
    cards:
