      entity: sensor.crop_steering_zone_3_vwc
      name: Z3 VWC
      min: 0
      max: 100
      needle: true
      severity: *id001
    - type: gauge
      entity: sensor.crop_steering_zone_3_ec
      name: Z3 EC
      min: 0
      max: 12
      needle: true
      severity: *id002
  - type: markdown
    content: |-
      ### Sensors & Environment
      Source pH **{{ states('sensor.aquaponics_kit_f4f618_ph')|float(0)|round(1) }}** &middot; Source EC **{{ states('sensor.atlas_legacy_1_ec')|float(0)|round(1) }}** &middot; Room **{{ states('sensor.veg_scd41_top_temperature_scd41')|float(0)|round(1) }}&deg;C** / **{{ states('sensor.veg_scd41_top_humidity_scd41')|float(0)|round(0) }}%** &middot; Tank {{ states('sensor.tank_percentage_full') }}%
  - type: entities
