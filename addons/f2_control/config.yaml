name: Crop Steering
version: "0.10.0"
slug: f2_control
description: >-
  Autonomous crop steering for Home Assistant. Runs the daily P0-P1-P2-P3 dryback
  cycle per zone from your live VWC/EC probes (fusing multiple sensors per zone),
  sequences the pump and valves with valve-close read-back, and is gated by a hard
  kill switch. Configure once in the Crop Steering UI; the operator dashboards are
  served right in the sidebar.
url: https://github.com/JakeTheRabbit/f2-control
arch:
  - amd64
  - aarch64
  - armv7
init: false
boot: manual
startup: application
homeassistant_api: true
hassio_api: false
host_network: false
ingress: true
ingress_port: 8420
panel_icon: mdi:sprout
panel_title: Crop Steering
options:
  num_zones: 3
  lights_on_hour: 10
  lights_off_hour: 22
  enable_flag: input_boolean.f2_control_enabled
  notify_service: notify/mobile_app_s23ultra
  notify_min: 30
  feed_ec_sensor: ""
  feed_ph_sensor: ""
  substrate_l: 5
  flow_lps: 0.02
  loop_seconds: 60
schema:
  num_zones: int
  lights_on_hour: float
  lights_off_hour: float
  enable_flag: str
  notify_service: str
  notify_min: float
  feed_ec_sensor: str?
  feed_ph_sensor: str?
  substrate_l: float
  flow_lps: float
  loop_seconds: float
