name: F2 Crop Steering
version: "0.4.0"
slug: f2_control
description: >-
  Autonomous crop-steering engine for Home Assistant. Runs the per-zone
  P0-P1-P2-P3 cycle, drives the pump/valves with read-back, republishes the
  crop_steering_* status surface, sends 30-min vitals, and is gated by a hard
  kill switch. Replaces AppDaemon.
url: https://github.com/JakeTheRabbit/f2-control
arch:
  - amd64
  - aarch64
  - armv7
init: false
boot: manual
startup: application
homeassistant_api: true
hassio_api: false
host_network: false
ingress: true
ingress_port: 8420
panel_icon: mdi:sprout
panel_title: F2 Crop Steering
options:
  lights_on_hour: 10
  lights_off_hour: 22
  enable_flag: input_boolean.f2_control_enabled
  notify_service: notify/mobile_app_s23ultra
  notify_min: 30
  substrate_l: 6
  flow_lps: 0.067
  loop_seconds: 60
schema:
  lights_on_hour: float
  lights_off_hour: float
  enable_flag: str
  notify_service: str
  notify_min: float
  substrate_l: float
  flow_lps: float
  loop_seconds: float
