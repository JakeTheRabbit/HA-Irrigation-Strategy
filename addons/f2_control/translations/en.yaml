configuration:
  num_zones:
    name: Number of zones (fallback)
    description: >-
      Normally AUTO-DETECTED from the integration's sensor.crop_steering_vwc_zone_N. This
      value is only used if Home Assistant isn't reachable at startup. Add more probes per
      zone in the Crop Steering UI - the engine reads each zone's FUSED
      sensor.crop_steering_vwc_zone_N / ec_zone_N (an average of every probe you map).
  lights_on_hour:
    name: Lights-on hour (fallback)
    description: >-
      Lights are read live from the integration (number.crop_steering_lights_on_hour) so you
      set them ONCE in the Crop Steering UI. This option is only a fallback used if that
      entity is missing. Hour 0-23; lights-on starts the grow-day.
  lights_off_hour:
    name: Lights-off hour (fallback)
    description: >-
      Fallback only - lights are read live from the integration
      (number.crop_steering_lights_off_hour). Hour 0-23; at lights-off every zone is forced
      into the overnight dry-back phase (P3).
  enable_flag:
    name: Kill-switch entity
    description: >-
      The master safety switch. While this input_boolean is OFF the engine reads
      sensors and makes decisions but NEVER opens a valve (the safe default).
      Turn it ON to go live. Leave as input_boolean.f2_control_enabled unless you
      named your helper something else.
  notify_service:
    name: Notification service
    description: >-
      Where to send vitals and alerts. Use the path form notify/<your_service>,
      for example notify/mobile_app_pixel_8. Find yours in
      Developer Tools > Actions by typing "notify".
  notify_min:
    name: Minutes between routine notifications
    description: >-
      Minimum minutes between routine "vitals" messages so you are not spammed.
      Urgent alerts ignore this throttle. Default 30.
  feed_ec_sensor:
    name: Source-water EC sensor (optional)
    description: >-
      Entity id of your reservoir / source-water EC probe, e.g.
      sensor.my_reservoir_ec. When set, the engine gates irrigation on the feed
      EC being inside number.crop_steering_irrigation_ec_min / _max (fail-closed
      if the probe dies). LEAVE BLANK if you have no feed-EC probe - the
      source-water EC gate is then disabled, but dosing / tank-fill holds still
      apply.
  feed_ph_sensor:
    name: Source-water pH sensor (optional)
    description: >-
      Entity id of your reservoir / source-water pH probe, e.g.
      sensor.my_reservoir_ph. When set, the engine gates irrigation on the feed
      pH being inside number.crop_steering_irrigation_ph_min / _max (fail-closed
      if the probe dies). LEAVE BLANK if you have no feed-pH probe - the
      source-water pH gate is then disabled.
  substrate_l:
    name: Fallback substrate volume (L per plant)
    description: >-
      Last-resort fallback ONLY, used if the integration's per-zone
      substrate_volume number is unset. The generic default is a safe
      placeholder - set your real per-plant block size in the Crop Steering UI.
      Normally leave this: real shot sizing is read live from your per-zone
      hardware numbers (substrate_volume x plant_count).
  flow_lps:
    name: Fallback drip flow (L per second)
    description: >-
      Last-resort fallback ONLY, used if the per-zone flow cannot be computed
      from your plant count and dripper settings. The generic default is a safe
      placeholder. Normally leave this: real flow is
      plant_count x drippers_per_plant x dripper_flow_rate.
  loop_seconds:
    name: Decision interval (seconds)
    description: >-
      How often the engine wakes to read sensors and decide. Default 60. Lower
      reacts faster but makes more Home Assistant API calls.
