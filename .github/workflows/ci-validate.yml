name: Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-validate:
    name: Lint (ruff/black/yamllint) and HA validations
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.11', '3.12' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # no pip cache: the repo intentionally has no requirements.txt/pyproject
          # (integration is dependency-free; engine deps live in the AppDaemon container)

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.5.5 black==24.4.2 yamllint==1.35.1 pytest==8.2.2

      - name: Ruff (lint)
        run: |
          ruff --version
          ruff check .

      - name: Black (format check)
        # Scoped to the integration + tests. The AppDaemon engine module is
        # deployed file-for-file to the live box; reformatting it would bury
        # real diffs in noise, so it is exempt from the black gate.
        run: |
          black --version
          black --check custom_components/ tests/

      - name: Yamllint
        run: |
          yamllint --version
          yamllint .  # rules in .yamllint (structural gate, style relaxed)

      - name: Pytest (integration calculation helpers)
        run: |
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest tests/ -v

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master

      - name: HACS Validation (integration)
        uses: hacs/action@main
        with:
          category: integration
          # brands requires a home-assistant/brands submission; custom repos
          # installed by URL don't need it (same ignore as install.yml)
          ignore: brands

  dependency-review:
    name: Dependency Review (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
