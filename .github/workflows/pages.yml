name: Deploy demo to GitHub Pages

# Publishes the token/key/IP-blanked dashboards in www/ to GitHub Pages.
# The dashboards auto-enter demo mode (baked-in mock data) when served from *.github.io,
# so f2.html runs standalone with no Home Assistant, no token, no network.
# Demo: https://jaketherabbit.github.io/HA-Irrigation-Strategy/f2.html?demo

on:
  push:
    branches: [main]
    paths:
      - 'www/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: www
      - id: deployment
        uses: actions/deploy-pages@v4
