  #
  # IMPORTANT: The AC automations will NOT function until these are mapped.
  # You can verify available entities by running in HA Developer Tools:
  #   {{ states.climate | list }}
  # ---------------------------------------------------------------------------

  # NOTE: AC units use the climate domain directly (not template switches)
  # because climate entities need set_temperature, set_hvac_mode, set_fan_mode
  # which template switches cannot proxy. The irrigation_ac_* names below are just
  # input_text helpers holding the real entity IDs, referenced by automations.

  # (AC mapping is done via input_text helpers in Section 3 below)

# ---------------------------------------------------------------------------
# SECTION 3 - AC & LIGHT ENTITY MAP (input_text based)
# These input_texts hold the real entity IDs for climate/light entities
# that need full domain access (not just on/off like template switches).
