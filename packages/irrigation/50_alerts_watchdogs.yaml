###############################################################################
# Irrigation GROW PACK — 50 ALERTS & WATCHDOGS
# /config/packages/irrigation/50_alerts_watchdogs.yaml
#
# PURPOSE : Safety interlocks, stuck-valve protection, sensor unavailability
#           alerts, and escalation logic.  The last line of defence.
#
# PRINCIPLE: Fail safe — any watchdog that cannot verify a safe state closes
#            all valves and notifies operators.
###############################################################################


automation:

  # ═══════════════════════════════════════════════════════════════════════════
  # VALVE WATCHDOGS — MAX RUNTIME ENFORCEMENT
  # ═══════════════════════════════════════════════════════════════════════════
  # If any table valve is still ON after irrigation_valve_max_runtime_sec seconds,
  # trigger emergency stop.  Separate automation per table for clarity.

  - id: irrigation_watchdog_table_1_valve
    alias: "GW Watchdog Table 1 Valve"
    trigger:
      - trigger: state
        entity_id: switch.irrigation_table_1_valve
        to: "on"
        for:
          seconds: "{{ states('input_number.irrigation_valve_max_runtime_sec') | int(180) }}"
    action:
      - action: switch.turn_off
        target:
          entity_id: switch.irrigation_table_1_valve
      - action: switch.turn_off
        target:
          entity_id:
            - switch.irrigation_mains_water
            - switch.irrigation_mainline
            - switch.irrigation_manifold
      - action: script.irrigation_send_alert
        data:
          title: "🚨 GW Table 1 Valve Stuck"
          message: >
            Table 1 valve exceeded max runtime
            ({{ states('input_number.irrigation_valve_max_runtime_sec') | int }}s).
            Valve and infrastructure closed.
          level: "critical"

  - id: irrigation_watchdog_table_2_valve
    alias: "GW Watchdog Table 2 Valve"
