###############################################################################
# Irrigation GROW PACK — 20 MODEL
# /config/packages/irrigation/20_model.yaml
#
# PURPOSE : All configurable helpers (schedules, targets, phase flags, timers).
#           Operators tune these values in the HA UI – no YAML edits needed
#           after commissioning.
#
# All entity names use the "GW …" prefix and irrigation_* entity_ids.
# No raw hardware entity_ids in this file.
###############################################################################


# ─────────────────────────────────────────────────────────────────────────────
# IRRIGATION SCHEDULE HELPERS
# ─────────────────────────────────────────────────────────────────────────────
input_datetime:

  # Daily irrigation window start (default: 08:00 – at lights-on)
  irrigation_irrigate_start_time:
    name: "GW Irrigate Start Time"
    has_date: false
    has_time: true
    icon: mdi:clock-start

  # Daily irrigation window end (default: 20:00 – 2 h before lights-off)
  irrigation_irrigate_end_time:
    name: "GW Irrigate End Time"
    has_date: false
    has_time: true
    icon: mdi:clock-end


input_number:

  # Minutes between irrigation runs (per enabled table), during window
  irrigation_irrigate_interval_min:
    name: "GW Irrigate Interval (min)"
    min: 5
    max: 240
    step: 5
    initial: 60
    unit_of_measurement: "min"
    icon: mdi:timer-outline

  # Duration each table valve stays open per run
  irrigation_irrigate_duration_sec:
    name: "GW Irrigate Duration (s)"
    min: 10
    max: 300
    step: 5
    initial: 60
    unit_of_measurement: "s"
    icon: mdi:water-clock

  # Hard maximum any single valve can stay open (watchdog limit)
  irrigation_valve_max_runtime_sec:
    name: "GW Valve Max Runtime (s)"
    min: 30
    max: 600
    step: 30
    initial: 180
    unit_of_measurement: "s"
    icon: mdi:timer-alert

  # Temperature targets for environment control
  irrigation_temp_target_day:
    name: "GW Temp Target Day (°C)"
    min: 18.0
    max: 32.0
    step: 0.5
    initial: 25.0
    unit_of_measurement: "°C"
    icon: mdi:thermometer-chevron-up

  irrigation_temp_target_night:
    name: "GW Temp Target Night (°C)"
    min: 15.0
    max: 28.0
    step: 0.5
    initial: 21.0
    unit_of_measurement: "°C"
    icon: mdi:thermometer-chevron-down

  irrigation_temp_high_alert:
    name: "GW Temp High Alert (°C)"
    min: 25.0
    max: 40.0
    step: 0.5
    initial: 30.0
    unit_of_measurement: "°C"
    icon: mdi:thermometer-alert

  # RH targets
  irrigation_rh_target_day:
    name: "GW RH Target Day (%)"
    min: 40.0
    max: 80.0
    step: 1.0
    initial: 60.0
    unit_of_measurement: "%"
    icon: mdi:water-percent

  irrigation_rh_target_night:
    name: "GW RH Target Night (%)"
    min: 40.0
    max: 75.0
    step: 1.0
    initial: 55.0
    unit_of_measurement: "%"
    icon: mdi:water-percent

  irrigation_rh_high_alert:
    name: "GW RH High Alert (%)"
    min: 60.0
    max: 95.0
    step: 1.0
    initial: 80.0
    unit_of_measurement: "%"
    icon: mdi:water-alert

  # CO2 targets (ppm)
  irrigation_co2_target:
    name: "GW CO2 Target (ppm)"
    min: 400
    max: 1500
    step: 50
    initial: 1000
    unit_of_measurement: "ppm"
    icon: mdi:molecule-co2

  irrigation_co2_high_alert:
    name: "GW CO2 High Alert (ppm)"
    min: 800
    max: 2000
    step: 50
    initial: 1400
    unit_of_measurement: "ppm"
    icon: mdi:molecule-co2

  irrigation_co2_low_alert:
    name: "GW CO2 Low Alert (ppm)"
    min: 200
    max: 900
    step: 50
    initial: 400
    unit_of_measurement: "ppm"
    icon: mdi:molecule-co2


# ─────────────────────────────────────────────────────────────────────────────
# TIMERS  (irrigation run tracking, one per table)
# ─────────────────────────────────────────────────────────────────────────────
timer:

  irrigation_table_1_run_timer:
    name: "GW Table 1 Run Timer"
    icon: mdi:timer
    restore: true

  irrigation_table_2_run_timer:
    name: "GW Table 2 Run Timer"
    icon: mdi:timer
    restore: true

  irrigation_table_3_run_timer:
    name: "GW Table 3 Run Timer"
    icon: mdi:timer
    restore: true

  irrigation_table_4_run_timer:
    name: "GW Table 4 Run Timer"
    icon: mdi:timer
    restore: true

  irrigation_table_5_run_timer:
    name: "GW Table 5 Run Timer"
    icon: mdi:timer
    restore: true

  irrigation_table_6_run_timer:
    name: "GW Table 6 Run Timer"
    icon: mdi:timer
    restore: true


# ─────────────────────────────────────────────────────────────────────────────
# DERIVED MODEL SENSORS  (template – calculated from helpers above)
# ─────────────────────────────────────────────────────────────────────────────
template:

  - sensor:

      # Current active temp target (day vs night based on lights state)
      - unique_id: irrigation_temp_target
        name: "GW Temp Target"
        unit_of_measurement: "°C"
        icon: mdi:thermometer
        state: >
          {% if is_state('binary_sensor.irrigation_lights_on', 'on') %}
            {{ states('input_number.irrigation_temp_target_day') | float(25) }}
          {% else %}
            {{ states('input_number.irrigation_temp_target_night') | float(21) }}
          {% endif %}

      # Current active RH target
      - unique_id: irrigation_rh_target
        name: "GW RH Target"
        unit_of_measurement: "%"
        icon: mdi:water-percent
        state: >
          {% if is_state('binary_sensor.irrigation_lights_on', 'on') %}
            {{ states('input_number.irrigation_rh_target_day') | float(60) }}
          {% else %}
            {{ states('input_number.irrigation_rh_target_night') | float(55) }}
          {% endif %}

  - binary_sensor:

      # IRRIGATION ALLOWED – master gate consumed by 30_irrigation.yaml
      # True only when all of these conditions are met:
      #   - pack is enabled
      #   - NOT in maintenance mode
      #   - no leak detected
      #   - tank is NOT low
      #   - current time is within the irrigation window
      - unique_id: irrigation_irrigation_allowed
        name: "GW Irrigation Allowed"
        device_class: running
        icon: mdi:water-check
        state: >
          {% set enabled      = is_state('input_boolean.irrigation_enable', 'on') %}
          {% set irrig_on    = is_state('input_boolean.irrigation_irrigation_enabled', 'on') %}
          {% set maintenance  = is_state('input_boolean.irrigation_maintenance_mode', 'on') %}
          {% set leak         = is_state('binary_sensor.irrigation_leak', 'on') %}
          {% set tank_low     = is_state('binary_sensor.irrigation_tank_low', 'on') %}
          {% set start_t      = states('input_datetime.irrigation_irrigate_start_time') %}
          {% set end_t        = states('input_datetime.irrigation_irrigate_end_time') %}
          {% set now_t        = now().strftime('%H:%M:%S') %}
          {% set in_window    = (now_t >= start_t) and (now_t <= end_t) %}
          {{ enabled and irrig_on and not maintenance and not leak and not tank_low and in_window }}
