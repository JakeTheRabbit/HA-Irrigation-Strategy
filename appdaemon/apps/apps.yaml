# AppDaemon Apps Configuration — F2 Crop Steering.
#
# master_crop_steering: the FULL original engine (8,299-line package), with the identified
# bugs fixed IN PLACE — no steering logic removed:
#   (a) _check_all_zone_phase_transitions now reads the dryback target from the number
#       entities instead of the hardcoded P0Data default (50%).
#   (b) the duplicate _should_zone_start_p3 is de-shadowed (entity-driven 3-arg version is
#       reachable again) and force_phase/try_transition_to are now real methods on the
#       state machine, so the manual-phase service no longer throws.
#   (c) the three irrigation safety handlers now fail CLOSED (block on error), not open.
#   (d) analytics set_state calls drop the duplicate state= and JSON-sanitise attributes,
#       so they stop returning HTTP 400.
# emergency_vwc corrected 30 -> 10 (30 read this substrate's normal 12-28% VWC as a constant
# emergency). Bring up DISARMED first (system_enabled OFF) to watch one clean cycle, then arm.
master_crop_steering:
  module: crop_steering.master_crop_steering_app
  class: MasterCropSteeringApp
  log_level: INFO
  num_zones: 3
  notification_service: notify.persistent_notification
  hardware:
    pump_master: switch.veg_main_pump
    main_line: switch.espoe_irrigation_relay_2_3
    zone_valves:
      1: switch.f2_row1
      2: switch.f2_row2
      3: switch.f2_row3
    zone_switches:
      - switch.f2_row1
      - switch.f2_row2
      - switch.f2_row3
  sensors:
    vwc:
      - sensor.f2_row_1_vwc
      - sensor.veg_sdi12_vwc_2
      - sensor.veg_sdi12_vwc
    ec:
      - sensor.f2_row_1_pwec
      - sensor.veg_sdi12_ec_2
      - sensor.veg_sdi12_ec
    environmental:
      temperature: sensor.veg_scd41_top_temperature_scd41
      humidity: sensor.veg_scd41_top_humidity_scd41
      vpd: sensor.veg_vpd
  timing:
    phase_check_interval: 60
    ml_prediction_interval: 300
    sensor_health_interval: 300
  thresholds:
    critical_ec: 9.0
    emergency_vwc: 10.0
    min_irrigation_interval: 300
  # Source-water quality gate: block irrigation while the veg batch tank pH/EC sit outside
  # the limits set on the dashboard (number.crop_steering_irrigation_ph_min/max + ec_min/max).
  # Out of range -> phone alert to the S23 Ultra with an "Irrigate Anyway" button that grants
  # a 30-min override of THIS gate only. An EC bound is ignored while its limit is 0.
  source_water:
    ph_sensor: sensor.aquaponics_kit_f4f618_ph
    ec_sensor: sensor.atlas_legacy_1_ec
    notify_service: notify.mobile_app_s23ultra
    override_minutes: 30

# Python modules the engine references when available (all features degrade gracefully
# to pure-Python if these aren't installed in the AppDaemon environment).
global_modules:
  - requests
  - numpy
  - pandas
  - plotly
  - scipy
