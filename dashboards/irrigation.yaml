  # ═══════════════════════════════════════════════════════════════════════════
  #  VIEW 3 — TRENDS (history graphs)
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Trends
    path: trends
    icon: mdi:chart-line
    type: sections
    max_columns: 3
    sections:
      # ── VWC Trend ─────────────────────────────────────────────────────────
      - type: grid
        cards:
          - type: history-graph
            title: "VWC — All Tables (24h)"
            hours_to_show: 24
            entities:
              - entity: sensor.irrigation_table_1_vwc
                name: T1
              - entity: sensor.irrigation_table_2_vwc
                name: T2
              - entity: sensor.irrigation_table_3_vwc
                name: T3
              - entity: sensor.irrigation_table_4_vwc
                name: T4
              - entity: sensor.irrigation_table_5_vwc
                name: T5
              - entity: sensor.irrigation_table_6_vwc
                name: T6
              - entity: sensor.irrigation_average_vwc
                name: Avg

      # ── EC Trend ──────────────────────────────────────────────────────────
      - type: grid
        cards:
          - type: history-graph
            title: "EC — All Tables (24h)"
            hours_to_show: 24
            entities:
              - entity: sensor.irrigation_table_1_ec
                name: T1
              - entity: sensor.irrigation_table_2_ec
                name: T2
              - entity: sensor.irrigation_table_3_ec
                name: T3
              - entity: sensor.irrigation_table_4_ec
                name: T4
              - entity: sensor.irrigation_table_5_ec
                name: T5
              - entity: sensor.irrigation_table_6_ec
                name: T6
