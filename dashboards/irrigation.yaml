        cards:
          - type: history-graph
            title: "Temp & VPD (24h)"
            hours_to_show: 24
            entities:
              - entity: sensor.irrigation_room_1_temp
                name: Room Temp
              - entity: sensor.irrigation_leaf_temperature
                name: Leaf Temp
              - entity: sensor.irrigation_room_1_vpd
