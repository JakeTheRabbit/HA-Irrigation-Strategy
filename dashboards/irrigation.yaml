            title: "Substrate Temp (24h)"
            hours_to_show: 24
            entities:
              - entity: sensor.irrigation_table_1_substrate_temp
                name: T1
              - entity: sensor.irrigation_table_2_substrate_temp
                name: T2
              - entity: sensor.irrigation_table_3_substrate_temp
                name: T3
              - entity: sensor.irrigation_table_4_substrate_temp
                name: T4
              - entity: sensor.irrigation_table_5_substrate_temp
                name: T5
              - entity: sensor.irrigation_table_6_substrate_temp
