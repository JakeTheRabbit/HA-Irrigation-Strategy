      # ── RH & CO2 ────────────────────────────────────────────────────────
      - type: grid
        cards:
          - type: history-graph
            title: "RH & CO2 (24h)"
            hours_to_show: 24
            entities:
              - entity: sensor.irrigation_room_1_rh
                name: RH
              - entity: sensor.irrigation_room_1_co2
                name: CO2

      # ── Tank ─────────────────────────────────────────────────────────────
      - type: grid
        cards:
          - type: history-graph
            title: "Tank pH & EC (24h)"
            hours_to_show: 24
            entities:
              - entity: sensor.irrigation_tank_ph
                name: pH
              - entity: sensor.irrigation_tank_ec
                name: EC

  # ═══════════════════════════════════════════════════════════════════════════
  #  VIEW 4 — ENVIRONMENT
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Environment
    path: environment
    icon: mdi:thermometer
    type: sections
    max_columns: 3
    sections:
      # ── Live Gauges ───────────────────────────────────────────────────────
      - type: grid
        column_span: 3
        cards:
          - type: gauge
            entity: sensor.irrigation_room_1_temp
            name: Temperature
            min: 10
            max: 45
            severity:
              green: 20
              yellow: 30
              red: 35
          - type: gauge
            entity: sensor.irrigation_room_1_rh
            name: Humidity
            min: 0
            max: 100
            severity:
              green: 40
              yellow: 65
              red: 80
          - type: gauge
            entity: sensor.irrigation_room_1_co2
            name: CO2
            min: 0
            max: 2000
            severity:
              green: 400
              yellow: 1200
              red: 1600
          - type: gauge
            entity: sensor.irrigation_room_1_vpd
            name: VPD
            min: 0
            max: 3
            severity:
              green: 0.8
              yellow: 1.4
              red: 2.0

      # ── Temperature Targets ───────────────────────────────────────────────
      - type: grid
