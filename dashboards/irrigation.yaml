title: "Irrigation"
views:
  # ═══════════════════════════════════════════════════════════════════════════
  #  VIEW 1 — COMMAND CENTER
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Command Center
    path: command-center
    icon: mdi:view-dashboard
    type: sections
    max_columns: 4
    sections:
      # ── System Controls ───────────────────────────────────────────────────
      - type: grid
        column_span: 4
        cards:
          - type: entities
            title: "System Controls"
            show_header_toggle: false
            entities:
              - entity: input_boolean.irrigation_enable
                name: GW System
                icon: mdi:power
              - entity: input_boolean.irrigation_maintenance_mode
                name: Maintenance
                icon: mdi:wrench
              - entity: binary_sensor.irrigation_system_ready
                name: System Ready
                icon: mdi:check-circle
              - entity: binary_sensor.irrigation_lights_on
                name: Lights
                icon: mdi:lightbulb
              - entity: sensor.grow_room_light_timer
                name: Light Timer
                icon: mdi:timer
              - entity: switch.irrigation_co2
                name: CO2
                icon: mdi:molecule-co2
              - entity: sensor.irrigation_room_1_co2
                name: CO2 Level
                icon: mdi:gauge

      # ── Crop Steering Status ──────────────────────────────────────────────
      - type: grid
        column_span: 2
        cards:
          - type: entities
            title: "Crop Steering"
            show_header_toggle: false
            entities:
              - entity: sensor.crop_steering_app_status
                name: App Status
                icon: mdi:application
              - entity: sensor.crop_steering_app_current_phase
                name: Zone Phases
                icon: mdi:chart-timeline-variant
              - entity: sensor.crop_steering_app_next_irrigation
                name: Next Irrigation
                icon: mdi:clock-outline
              - entity: select.irrigation_phase
                name: Target Phase
                icon: mdi:target
              - entity: select.steering_mode
                name: Steering Mode
                icon: mdi:tune
              - entity: select.crop_type
                name: Crop Type
                icon: mdi:sprout
              - entity: binary_sensor.crop_steering_dryback_in_progress
                name: Dryback In Progress
                icon: mdi:water-minus
              - entity: sensor.crop_steering_system_uptime
                name: Uptime (hours)
                icon: mdi:clock-check

          - type: entities
            title: "System Health"
            show_header_toggle: false
            entities:
              - entity: sensor.crop_steering_system_health_score
                name: Health Score
                icon: mdi:heart-pulse
              - entity: sensor.crop_steering_system_safety_status
                name: Safety Status
                icon: mdi:shield-check
              - entity: sensor.crop_steering_sensor_health
                name: Active Sensors
                icon: mdi:access-point
              - entity: sensor.crop_steering_sensor_fusion_confidence
                name: Fusion Confidence
                icon: mdi:brain
              - entity: sensor.crop_steering_fused_vwc
                name: Fused VWC
                icon: mdi:water-percent
              - entity: sensor.crop_steering_fused_ec
                name: Fused EC
                icon: mdi:flash
              - entity: switch.ec_stacking_enabled
                name: EC Stacking
                icon: mdi:layers
              - entity: switch.analytics_enabled
                name: Analytics
                icon: mdi:chart-bar

          - type: entities
            title: "Shot Calculations"
            show_header_toggle: false
            entities:
              - entity: sensor.p1_shot_duration
                name: P1 Shot Duration
                icon: mdi:timer-sand
              - entity: sensor.p2_shot_duration
                name: P2 Shot Duration
                icon: mdi:timer-sand
              - entity: sensor.p3_emergency_shot_duration
                name: P3 Emergency Duration
                icon: mdi:timer-sand
              - entity: sensor.p2_vwc_threshold_adjusted
                name: P2 VWC Threshold (adj)
                icon: mdi:water-alert
              - entity: sensor.irrigation_average_vwc
                name: Average VWC
                icon: mdi:water-percent
              - entity: sensor.irrigation_average_ec
                name: Average EC
                icon: mdi:flash

      # ── Safety & Infrastructure ──────────────────────────────────────────
      - type: grid
        column_span: 2
        cards:
          - type: glance
            title: "Safety"
            show_state: true
            columns: 3
            entities:
              - entity: binary_sensor.irrigation_irrigation_allowed
                name: Irrigation OK
              - entity: binary_sensor.irrigation_tank_low
                name: Tank Low
              - entity: binary_sensor.irrigation_leak_detected
                name: Leak Detect

          - type: glance
            title: "Tank"
            show_state: true
            columns: 2
            entities:
              - entity: sensor.irrigation_tank_ph
                name: pH
              - entity: sensor.irrigation_tank_ec
                name: EC

          - type: entities
            title: "Infrastructure"
            show_header_toggle: false
            entities:
              - entity: switch.irrigation_mainline
                name: Mainline (opens pump)
                icon: mdi:pipe-valve
              - entity: switch.irrigation_manifold
                name: Manifold (tank/mix)
                icon: mdi:pipe
              - entity: switch.irrigation_mains_water
                name: Mains Water (tank fill)
                icon: mdi:water-pump
              - entity: switch.irrigation_waste_valve
                name: Waste Valve
                icon: mdi:pipe-disconnected
              - entity: switch.irrigation_recirculation_valve
                name: Recirculation
                icon: mdi:recycle
              - entity: switch.irrigation_tank_fill_valve
                name: Tank Fill Valve
                icon: mdi:valve

      # ── All Zones At A Glance ─────────────────────────────────────────────
      - type: grid
        column_span: 4
        cards:
          - type: glance
            title: "VWC — All Tables"
            columns: 6
            show_state: true
            entities:
              - entity: sensor.irrigation_table_1_vwc
                name: T1
              - entity: sensor.irrigation_table_2_vwc
                name: T2
              - entity: sensor.irrigation_table_3_vwc
                name: T3
              - entity: sensor.irrigation_table_4_vwc
                name: T4
              - entity: sensor.irrigation_table_5_vwc
                name: T5
              - entity: sensor.irrigation_table_6_vwc
                name: T6

          - type: glance
            title: "EC — All Tables"
            columns: 6
            show_state: true
            entities:
              - entity: sensor.irrigation_table_1_ec
                name: T1
              - entity: sensor.irrigation_table_2_ec
                name: T2
              - entity: sensor.irrigation_table_3_ec
                name: T3
              - entity: sensor.irrigation_table_4_ec
                name: T4
              - entity: sensor.irrigation_table_5_ec
                name: T5
              - entity: sensor.irrigation_table_6_ec
                name: T6

          - type: glance
            title: "Substrate Temp"
            columns: 6
            show_state: true
            entities:
              - entity: sensor.irrigation_table_1_substrate_temp
                name: T1
              - entity: sensor.irrigation_table_2_substrate_temp
                name: T2
              - entity: sensor.irrigation_table_3_substrate_temp
                name: T3
              - entity: sensor.irrigation_table_4_substrate_temp
                name: T4
              - entity: sensor.irrigation_table_5_substrate_temp
                name: T5
              - entity: sensor.irrigation_table_6_substrate_temp
                name: T6

          - type: glance
            title: "Zone Phase"
            columns: 6
            show_state: true
            entities:
              - entity: sensor.crop_steering_zone_1_phase
                name: T1
              - entity: sensor.crop_steering_zone_2_phase
                name: T2
              - entity: sensor.crop_steering_zone_3_phase
                name: T3
              - entity: sensor.crop_steering_zone_4_phase
                name: T4
              - entity: sensor.crop_steering_zone_5_phase
                name: T5
              - entity: sensor.crop_steering_zone_6_phase
                name: T6

          - type: glance
            title: "Zone Efficiency"
            columns: 6
            show_state: true
            entities:
              - entity: sensor.crop_steering_zone_1_efficiency
                name: T1
              - entity: sensor.crop_steering_zone_2_efficiency
                name: T2
              - entity: sensor.crop_steering_zone_3_efficiency
                name: T3
              - entity: sensor.crop_steering_zone_4_efficiency
                name: T4
              - entity: sensor.crop_steering_zone_5_efficiency
                name: T5
              - entity: sensor.crop_steering_zone_6_efficiency
                name: T6

          - type: glance
            title: "Zone Safety"
            columns: 6
            show_state: true
            entities:
              - entity: sensor.crop_steering_zone_1_safety_status
                name: T1
              - entity: sensor.crop_steering_zone_2_safety_status
                name: T2
              - entity: sensor.crop_steering_zone_3_safety_status
                name: T3
              - entity: sensor.crop_steering_zone_4_safety_status
                name: T4
              - entity: sensor.crop_steering_zone_5_safety_status
                name: T5
              - entity: sensor.crop_steering_zone_6_safety_status
                name: T6


  # ═══════════════════════════════════════════════════════════════════════════
  #  VIEW 2 — ZONE CONTROL (per-table detail)
  # ═══════════════════════════════════════════════════════════════════════════
