title: "F1 Setpoints"
views:

  # ════════════════════════════════════════════════════════════════
  # VIEW 1 — All targets in one place
  # ════════════════════════════════════════════════════════════════
  - title: Targets
    path: targets
    icon: mdi:target
    type: sections
    max_columns: 3
    sections:

      - type: grid
        column_span: 3
        cards:
          - type: markdown
            content: |
              ### F1 Grow Room
              [Overview](/f1-overview) ·
              [Climate](/f1-climate) ·
              [Substrate](/f1-substrate) ·
              [Intelligence](/f1-intelligence) ·
              **[Setpoints](/f1-setpoints)**

              Single page for every operator-controlled target. Reorganised
              by domain (Climate / Substrate / Irrigation cadence). When
              ClimateSense ships, this dashboard becomes the timeline-backed
              recipe view (see `docs/upgrade/CLIMATESENSE_PLAN.md`).

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: Climate targets
            show_header_toggle: false
            entities:
              - entity: input_number.gw_temp_target_day
                name: Day temp °C
              - entity: input_number.gw_temp_target_night
                name: Night temp °C
              - entity: input_number.gw_temp_high_alert
                name: Temp alert °C
              - type: divider
              - entity: input_number.gw_rh_target_day
                name: Day RH %
              - entity: input_number.gw_rh_target_night
                name: Night RH %
              - entity: input_number.gw_rh_high_alert
                name: RH alert %
              - type: divider
              - entity: input_number.gw_co2_target
                name: CO₂ target ppm
              - entity: input_number.gw_co2_high_alert
                name: CO₂ high alert ppm
              - entity: input_number.gw_co2_low_alert
                name: CO₂ low alert ppm

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: Substrate targets (RootSense)
            show_header_toggle: false
            entities:
              - entity: number.crop_steering_steering_intent
                name: "Cultivator intent (-100..+100)"
              - entity: select.crop_steering_steering_mode_derived
                name: Steering mode (derived)
              - type: divider
              - entity: number.crop_steering_veg_p0_dryback_drop_pct
                name: Veg P0 dryback %
              - entity: number.crop_steering_gen_p0_dryback_drop_pct
                name: Gen P0 dryback %
              - entity: sensor.crop_steering_p0_dryback_drop_pct_current
                name: Current P0 target (interpolated)
              - type: divider
              - entity: number.crop_steering_p1_target_vwc
                name: P1 target VWC %
              - entity: number.crop_steering_p2_vwc_threshold
                name: P2 threshold VWC %
              - entity: number.crop_steering_field_capacity
                name: Field capacity %
              - entity: number.crop_steering_max_ec
                name: Max EC mS/cm

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: Irrigation cadence
            show_header_toggle: false
            entities:
              - entity: input_datetime.gw_irrigate_start_time
                name: Start time
              - entity: input_datetime.gw_irrigate_end_time
                name: End time
              - entity: input_number.gw_irrigate_interval_min
                name: Interval (min)
              - entity: input_number.gw_irrigate_duration_sec
                name: Duration (s)
              - entity: input_number.gw_valve_max_runtime_sec
                name: Max runtime (s)
              - type: divider
              - entity: number.crop_steering_substrate_volume
                name: Substrate volume (L)
              - entity: number.crop_steering_dripper_flow_rate
                name: Dripper flow rate (L/h)
              - entity: number.crop_steering_drippers_per_plant
                name: Drippers per plant

      - type: grid
        column_span: 3
        cards:
          - type: custom:agency-sensor-analytics-card
            title: Targets vs measured — climate (last 7 d)
            subtitle: How well are we tracking each setpoint?
            default_timeframe: 7d
            refresh_seconds: 120
            timeframes: [24h, 7d, 30d, custom]
            overview:
              - entity: sensor.gw_room_1_temp
                name: Temp
                color: "#ff8b7f"
              - entity: sensor.gw_room_1_rh
                name: RH
                color: "#6ad6ff"
              - entity: sensor.gw_room_1_co2
                name: CO₂
                color: "#ffc86f"
              - entity: sensor.gw_room_1_vpd
                name: VPD
                color: "#ff9ecb"
            panels:
              left:
                title: Temperature — measured vs targets
                series:
                  - {entity: sensor.gw_room_1_temp,             name: Measured °C, color: "#ff8b7f"}
                  - {entity: input_number.gw_temp_target_day,     name: Day target,   color: "#ffc86f"}
                  - {entity: input_number.gw_temp_target_night,   name: Night target, color: "#a8a5ff"}
              right:
                title: RH — measured vs targets
                series:
                  - {entity: sensor.gw_room_1_rh,              name: Measured %,  color: "#6ad6ff"}
                  - {entity: input_number.gw_rh_target_day,      name: Day target,   color: "#ffc86f"}
                  - {entity: input_number.gw_rh_target_night,    name: Night target, color: "#a8a5ff"}

      - type: grid
        column_span: 3
        cards:
          - type: custom:agency-sensor-analytics-card
            title: Targets vs measured — substrate (last 7 d)
            subtitle: P1 target / P2 threshold vs current avg VWC
            default_timeframe: 7d
            refresh_seconds: 120
            timeframes: [24h, 7d, 30d, custom]
            overview:
              - entity: sensor.gw_average_vwc
                name: Avg VWC
                color: "#5ae0cf"
              - entity: number.crop_steering_p1_target_vwc
                name: P1 target
                color: "#ffc86f"
              - entity: number.crop_steering_p2_vwc_threshold
                name: P2 threshold
                color: "#ff9ecb"
            panels:
              left:
                title: Avg VWC vs P1/P2
                series:
                  - {entity: sensor.gw_average_vwc,                  name: Avg VWC,      color: "#5ae0cf"}
                  - {entity: number.crop_steering_p1_target_vwc,     name: P1 target,    color: "#ffc86f"}
                  - {entity: number.crop_steering_p2_vwc_threshold,  name: P2 threshold, color: "#ff9ecb"}
              right:
                title: Avg EC vs target ramp
                series:
                  - {entity: sensor.gw_average_ec,                   name: Avg EC,            color: "#a8a5ff"}
                  - {entity: number.crop_steering_ec_target_veg_p2,  name: Veg P2 EC target,  color: "#6ad6ff"}
                  - {entity: number.crop_steering_ec_target_gen_p2,  name: Gen P2 EC target,  color: "#ff8b7f"}
