title: "RootSense — History & Intelligence"
views:
  - title: Intent
    path: rootsense-intent
    icon: mdi:tune-variant
    type: sections
    max_columns: 3
    sections:

      # ══════════════════════════════════════════════════════════════════════
      # OPERATOR-FACING CONTROLS — the dial cultivators move day-to-day
      # ══════════════════════════════════════════════════════════════════════
      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: "Cultivator Intent"
            show_header_toggle: false
            entities:
              - entity: number.crop_steering_steering_intent
                name: "Intent (-100 gen … +100 veg)"
              - entity: select.crop_steering_steering_mode_derived
                name: "Steering Mode (derived)"
              - type: divider
              - entity: number.crop_steering_veg_p0_dryback_drop_pct
                name: "Vegetative P0 dryback %"
              - entity: number.crop_steering_gen_p0_dryback_drop_pct
                name: "Generative P0 dryback %"
              - entity: sensor.crop_steering_p0_dryback_drop_pct_current
                name: "Current P0 target (interpolated)"

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: "Intelligence Modules"
            show_header_toggle: false
            entities:
              - entity: switch.crop_steering_intelligence_root_zone_enabled
                name: "Root Zone"
              - entity: switch.crop_steering_intelligence_adaptive_enabled
                name: "Adaptive Irrigation"
              - entity: switch.crop_steering_intelligence_agronomic_enabled
                name: "Agronomic"
              - entity: switch.crop_steering_intelligence_orchestrator_enabled
                name: "Orchestrator"
              - entity: switch.crop_steering_intelligence_anomaly_enabled
                name: "Anomaly Scanner"
              - type: divider
              - entity: binary_sensor.crop_steering_anomaly_active
                name: "Active anomalies"

  - title: Substrate
    path: rootsense-substrate
    icon: mdi:water-percent
    type: sections
    max_columns: 2
    sections:

      # ══════════════════════════════════════════════════════════════════════
      # Multi-metric history overlay — VWC + EC + dryback velocity per zone
      # ══════════════════════════════════════════════════════════════════════
      # Uses HA's built-in history-graph card so no HACS dependency. If you
      # have ApexCharts installed, swap each card's `type` to
      # `custom:apexcharts-card` for richer overlays.
      - type: grid
        column_span: 2
        cards:
          - type: history-graph
            title: "Zone 1 — VWC, EC, dryback velocity"
            hours_to_show: 36
            entities:
              - entity: sensor.crop_steering_zone_1_avg_vwc
              - entity: sensor.crop_steering_zone_1_avg_ec
              - entity: sensor.crop_steering_zone_1_dryback_velocity_pct_per_hr
              - entity: sensor.crop_steering_zone_1_field_capacity_observed

          - type: history-graph
            title: "Zone 2 — VWC, EC, dryback velocity"
            hours_to_show: 36
            entities:
              - entity: sensor.crop_steering_zone_2_avg_vwc
              - entity: sensor.crop_steering_zone_2_avg_ec
              - entity: sensor.crop_steering_zone_2_dryback_velocity_pct_per_hr
              - entity: sensor.crop_steering_zone_2_field_capacity_observed

          - type: history-graph
            title: "Zone 3 — VWC, EC, dryback velocity"
            hours_to_show: 36
            entities:
              - entity: sensor.crop_steering_zone_3_avg_vwc
              - entity: sensor.crop_steering_zone_3_avg_ec
              - entity: sensor.crop_steering_zone_3_dryback_velocity_pct_per_hr
              - entity: sensor.crop_steering_zone_3_field_capacity_observed

      # ══════════════════════════════════════════════════════════════════════
      # Substrate analytics summary — the live RootSense values per zone
      # ══════════════════════════════════════════════════════════════════════
      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: "Zone 1 substrate intelligence"
            show_header_toggle: false
            entities:
              - entity: sensor.crop_steering_zone_1_field_capacity_observed
                name: "Observed FC"
                secondary_info: last-changed
              - entity: sensor.crop_steering_zone_1_dryback_velocity_pct_per_hr
                name: "Dryback velocity"
              - entity: sensor.crop_steering_zone_1_substrate_porosity_estimate_ml_per_pct
                name: "Substrate porosity"
              - entity: sensor.crop_steering_zone_1_ec_stack_index
                name: "EC stack index"

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: "Zone 2 substrate intelligence"
            show_header_toggle: false
            entities:
              - entity: sensor.crop_steering_zone_2_field_capacity_observed
                name: "Observed FC"
                secondary_info: last-changed
              - entity: sensor.crop_steering_zone_2_dryback_velocity_pct_per_hr
                name: "Dryback velocity"
              - entity: sensor.crop_steering_zone_2_substrate_porosity_estimate_ml_per_pct
                name: "Substrate porosity"
              - entity: sensor.crop_steering_zone_2_ec_stack_index
                name: "EC stack index"

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: "Zone 3 substrate intelligence"
            show_header_toggle: false
            entities:
              - entity: sensor.crop_steering_zone_3_field_capacity_observed
                name: "Observed FC"
                secondary_info: last-changed
              - entity: sensor.crop_steering_zone_3_dryback_velocity_pct_per_hr
                name: "Dryback velocity"
              - entity: sensor.crop_steering_zone_3_substrate_porosity_estimate_ml_per_pct
                name: "Substrate porosity"
              - entity: sensor.crop_steering_zone_3_ec_stack_index
                name: "EC stack index"

  - title: Anomalies
    path: rootsense-anomalies
    icon: mdi:alert-decagram-outline
    type: sections
    max_columns: 2
    sections:

      - type: grid
        column_span: 2
        cards:
          - type: logbook
            title: "Recent crop_steering_anomaly events"
            hours_to_show: 168
            entities:
              - binary_sensor.crop_steering_anomaly_active

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: "Anomaly scanner status"
            show_header_toggle: false
            entities:
              - entity: switch.crop_steering_intelligence_anomaly_enabled
                name: "Scanner enabled"
              - entity: binary_sensor.crop_steering_anomaly_active
                name: "Active anomalies"
