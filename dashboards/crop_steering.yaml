title: "Crop Steering AI"
views:
  - title: Crop Steering
    path: crop-steering
    icon: mdi:brain
    type: sections
    max_columns: 4
    sections:

      # ══════════════════════════════════════════════════════════════════════
      # ROW 1 — System Controls + Infrastructure + Valves (quick monitoring)
      # ══════════════════════════════════════════════════════════════════════

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: "System Controls"
            show_header_toggle: false
            entities:
              - entity: switch.system_enabled
                name: "System"
              - entity: switch.auto_irrigation_enabled
                name: "Auto Irrigation"
              - entity: switch.ec_stacking_enabled
                name: "EC Stacking"
              - entity: switch.analytics_enabled
                name: "Analytics"
              - entity: select.crop_type
                name: "Crop Type"
              - entity: select.growth_stage
                name: "Growth Stage"
              - entity: select.irrigation_phase
                name: "Phase Override"
              - entity: number.lights_on_hour
                name: "Lights On Hour"
              - entity: number.lights_off_hour
                name: "Lights Off Hour"

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: "Infrastructure"
            show_header_toggle: false
            entities:
              - entity: switch.gw_mainline
                name: "Mainline"
                secondary_info: last-changed
              - entity: switch.gw_mains_water
                name: "Mains Water"
                secondary_info: last-changed
              - entity: switch.gw_manifold
                name: "Manifold"
                secondary_info: last-changed
              - entity: switch.gw_tank_fill_valve
                name: "Tank Fill"
                secondary_info: last-changed
              - entity: switch.gw_waste_valve
                name: "Waste"
                secondary_info: last-changed
              - entity: switch.gw_recirculation_valve
                name: "Recirculation"
                secondary_info: last-changed

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: "Valves"
            show_header_toggle: false
            entities:
              - entity: switch.gw_table_1_valve
                name: "Table 1"
                secondary_info: last-changed
              - entity: switch.gw_table_2_valve
                name: "Table 2"
                secondary_info: last-changed
              - entity: switch.gw_table_3_valve
                name: "Table 3"
                secondary_info: last-changed
              - entity: switch.gw_table_4_valve
                name: "Table 4"
                secondary_info: last-changed
              - entity: switch.gw_table_5_valve
                name: "Table 5"
                secondary_info: last-changed
              - entity: switch.gw_table_6_valve
                name: "Table 6"
                secondary_info: last-changed

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: "AI Status"
            show_header_toggle: false
            entities:
              - entity: sensor.crop_steering_app_status
                name: "Status"
              - entity: sensor.crop_steering_app_current_phase
                name: "Zone Phases"
              - entity: sensor.crop_steering_app_next_irrigation
                name: "Next Irrigation"
              - entity: sensor.crop_steering_system_safety_status
                name: "Safety"
              - entity: sensor.crop_steering_system_uptime
                name: "Uptime"

      # ══════════════════════════════════════════════════════════════════════
      # ROW 2 — Live Sensors + Zone Phase Override + Trigger Shots
      # ══════════════════════════════════════════════════════════════════════

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: "VWC (%)"
            show_header_toggle: false
            entities:
              - entity: sensor.substrate_1_substrate_1_vwc_coco_coir
                name: "Table 1"
                secondary_info: last-changed
              - entity: sensor.substrate_2_substrate_2_vwc_coco_coir
                name: "Table 2"
                secondary_info: last-changed
              - entity: sensor.substrate_3_substrate_3_vwc_coco_coir
                name: "Table 3"
                secondary_info: last-changed
              - entity: sensor.substrate_4_substrate_4_vwc_coco_coir
                name: "Table 4"
                secondary_info: last-changed
              - entity: sensor.substrate_5_substrate_5_vwc_coco_coir
                name: "Table 5"
                secondary_info: last-changed
              - entity: sensor.substrate_6_substrate_6_vwc_coco_coir
                name: "Table 6"
                secondary_info: last-changed

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: "pwEC (mS/cm)"
            show_header_toggle: false
            entities:
              - entity: sensor.substrate_1_substrate_1_pwec
                name: "Table 1"
                secondary_info: last-changed
              - entity: sensor.substrate_2_substrate_2_pwec
                name: "Table 2"
                secondary_info: last-changed
              - entity: sensor.substrate_3_substrate_3_pwec
                name: "Table 3"
                secondary_info: last-changed
              - entity: sensor.substrate_4_substrate_4_pwec
                name: "Table 4"
                secondary_info: last-changed
              - entity: sensor.substrate_5_substrate_5_pwec
                name: "Table 5"
                secondary_info: last-changed
              - entity: sensor.substrate_6_substrate_6_pwec
                name: "Table 6"
                secondary_info: last-changed

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: "Zone Phase Override"
            show_header_toggle: false
            entities:
              - entity: select.zone_1_phase_override
                name: "Zone 1"
              - entity: select.zone_2_phase_override
                name: "Zone 2"
              - entity: select.zone_3_phase_override
                name: "Zone 3"
              - entity: select.zone_4_phase_override
                name: "Zone 4"
              - entity: select.zone_5_phase_override
                name: "Zone 5"
              - entity: select.zone_6_phase_override
                name: "Zone 6"

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: "Trigger Shot"
            show_header_toggle: false
            entities:
              - entity: button.zone_1_trigger_shot
                name: "Zone 1"
              - entity: button.zone_2_trigger_shot
                name: "Zone 2"
              - entity: button.zone_3_trigger_shot
                name: "Zone 3"
              - entity: button.zone_4_trigger_shot
                name: "Zone 4"
              - entity: button.zone_5_trigger_shot
                name: "Zone 5"
              - entity: button.zone_6_trigger_shot
                name: "Zone 6"

      # ══════════════════════════════════════════════════════════════════════
      # ROW 3 — System Health + Manual Override + Zone Safety + AI Oversight
      # ══════════════════════════════════════════════════════════════════════

      - type: grid
