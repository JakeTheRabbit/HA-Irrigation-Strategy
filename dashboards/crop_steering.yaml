      - type: grid
        column_span: 4
        cards:
          - type: markdown
            content: >
              ---


              # Crop Steering AI — Complete Guide


              ## How It Works


              This system automates irrigation using a **4-phase daily cycle** tied to
              your light schedule. Each "zone" is one table with its own substrate probe
              (VWC + EC sensor) and solenoid valve. The AI reads sensor data every few
              seconds and decides when, how much, and which zone to water.


              ---


              ## The 4 Phases


              ### P0 — Morning Dryback

              **When:** Lights turn ON. **What:** No watering. The substrate dries down
              from overnight saturation. The AI waits for VWC to drop by the **Dryback
              Target** (Veg: 50%, Gen: 40%) or until **Max Wait** time expires.


              **Why it matters:** Dryback creates a water-stress signal that tells the
              plant to shift between vegetative growth (leafy) and generative growth
              (flowers/fruit). More dryback = more generative steering.


              **Controls:**

              - `Veg Dryback Target` — VWC % the substrate must reach (lower = more stress)

              - `Gen Dryback Target` — Same but for flowering. Default 40% is aggressive.

              - `Min Wait (min)` — Don't check dryback before this time (prevents false triggers). Default: 30 min.

              - `Max Wait (min)` — Force move to P1 after this time even if target not hit. Default: 120 min.


              ### P1 — Ramp-Up

              **When:** P0 dryback achieved. **What:** Progressive irrigation shots that
              increase in size until VWC reaches **P1 Target VWC** (default 65%).


              **How shots work:** First shot = `Initial Shot %` of substrate volume. Each
              subsequent shot adds `Increment %`. Shots are spaced `Between Shots` minutes
              apart. Minimum `Min Shots` must fire before P2 can start. Maximum `Max Shots`
              before the system forces P2.


              **Controls:**

              - `Target VWC` — Stop P1 when VWC reaches this. Default: 65%.

              - `Initial Shot %` — First shot size as % of substrate. Default: 2% (0.2L in a 10L pot).

              - `Increment %` — Each shot grows by this. Default: 0.5%.

              - `Max Shot %` — Cap on shot size. Default: 10%.

              - `Between Shots (min)` — Wait time between shots. Default: 15 min. Shorter = faster ramp.

              - `Min/Max Shots` — Guardrails. Default: 3 min, 10 max.


              ### P2 — Maintenance

              **When:** P1 target VWC reached. **What:** Holds VWC steady with small
              maintenance shots whenever VWC drops below the **P2 Threshold** (default 60%).
              EC ratio adjusts shot size — high EC means bigger flush shot, low EC means
              smaller shot.


              **Controls:**

              - `VWC Threshold %` — Trigger point for maintenance shots. Default: 60%.

              - `Shot Size %` — Base maintenance shot. Default: 2% (5% in some configs).

              - `EC High Ratio` — If substrate EC is this many times above target, increase shot. Default: 1.2x.

              - `EC Low Ratio` — If substrate EC is this fraction of target, decrease shot. Default: 0.8x.


              ### P3 — Pre-Lights-Off

              **When:** Approaching lights-off time (calculated from dryback rate).
              **What:** Final dryback period. NO irrigation unless VWC drops to emergency
              level (wilt risk). Prepares the plant for the dark period.


              **Controls:**

              - `Emergency VWC %` — Below this, emergency watering fires to prevent wilting. Default: 40%.

              - `Emergency Shot %` — Small rescue shot. Default: 2%.

              - `Veg Last Irrig (min)` — Minutes before lights-off to transition. Default: 120 min.

              - `Gen Last Irrig (min)` — Same for flowering. Default: 180 min.


              ---


              ## EC Targets (Nutrient Concentration)


              EC targets tell the system what nutrient concentration to maintain in the
              substrate during each phase. The system uses the **EC ratio** (actual EC /
              target EC) to adjust irrigation behavior:


              - **Ratio > EC High Threshold (1.2x):** Substrate is too salty. System increases
              shot size to flush excess nutrients.

              - **Ratio < EC Low Threshold (0.8x):** Substrate EC is low. System decreases shots
              to allow concentration to build.

              - **Ratio near 1.0:** On target. Normal shot sizes.


              **Vegetative targets** are lower (3.0-3.2 mS/cm) because plants focus on
              leaf growth. **Generative targets** are higher (4.0-6.0 mS/cm) to drive
              flower/fruit production. The Athena methodology ramps EC through phases:
              P0 baseline → P1 baseline → P2 peak → P3 taper.


              ---


              ## Zone Configuration


              Each zone (table) can be configured independently:


              - **Enabled** — Master on/off for this zone. Disabled zones get no water.

              - **Manual Override** — When ON, blocks all AI irrigation for this zone. Use when
              you want to water by hand or do maintenance. **Critical safety feature.**

              - **Group** (A/B/C/D) — Zones in the same group coordinate watering. When 50%+
              of a group needs water, the whole group waters together. Use for tables fed by
              the same reservoir.

              - **Priority** (Critical/High/Normal/Low) — When multiple zones need water
              simultaneously, higher priority zones go first. Set Critical for motherplants
              or stressed zones.

              - **Crop Profile** — Per-zone crop type. "Follow Main" uses the global Crop Type.
              Set individually if running different strains/crops per table.

              - **Shot Multiplier** — Scales ALL shot sizes for this zone. 1.0 = normal,
              1.5 = 50% bigger shots, 0.5 = half shots. Useful for zones with different
              pot sizes or plant sizes.

              - **Plant Count** — Number of plants. Affects total water calculations.

              - **Max Daily Volume (L)** — Hard safety limit. System will not deliver more
              than this per day to this zone, regardless of what the AI wants.


              ---


              ## Hardware Configuration


              - **Substrate Volume (L)** — Total substrate per pot. All shot sizes are
              calculated as a % of this. 10L = 1 coco bag.

              - **Dripper Flow Rate (L/hr)** — Flow per dripper. Used to convert shot
              volume to duration (seconds of valve open time).

              - **Drippers/Plant** — Number of drippers per plant.

              - **Field Capacity %** — Maximum VWC the substrate can hold. Coco = 70%.
              System won't try to push VWC above this.

              - **Lights On/Off Hour** — Light schedule (24h format). Phase transitions
              are tied to this. P0 starts at lights-on, P3 ends at lights-off.


              ---


              ## Safety Features


              The system has multiple safety layers:


              1. **System Enabled** — Master kill switch. OFF = nothing waters.

              2. **Auto Irrigation** — OFF = no AI-driven shots. Manual shots still work.

              3. **Zone Enabled** — Per-zone on/off.

              4. **Manual Override** — Per-zone AI block.

              5. **Max Daily Volume** — Per-zone hard limit in liters.

              6. **Emergency VWC** — Below 40% triggers rescue watering to prevent wilting.

              7. **Startup Grace Period** — 120 seconds after restart, no emergency irrigation
              fires (prevents false triggers from partial sensor data).

              8. **Watchdog** — Detects hardware/state mismatches and executes emergency stop.

              9. **Sensor Health Monitoring** — Tracks sensor reliability and flags degraded probes.


              ---


              ## Crop Profiles


              | Profile | Dryback | EC Range | Best For |
              |---------|---------|----------|----------|
              | **Cannabis_Athena** | Moderate (15-25%) | 3.0-9.0 | Athena nutrient line, balanced hybrid |
              | **Cannabis_Indica** | Light (12-22%) | 2.8-8.0 | Indica-dominant, prefer moisture |
              | **Cannabis_Sativa** | Aggressive (18-30%) | 3.2-9.5 | Sativa-dominant, prefer dry |
              | **Cannabis_Hybrid** | Moderate (15-25%) | 3.0-8.5 | General hybrid |
              | **Tomato** | Very light (8-15%) | 2.0-4.5 | Hydroponic tomatoes |
              | **Lettuce** | Minimal (5-10%) | 1.2-2.5 | Leafy greens |


              ---


              ## Quick Start Checklist


              1. Set **Lights On/Off Hour** to match your light schedule

              2. Set **Substrate Volume** to your pot size in liters

              3. Set **Dripper Flow Rate** and **Drippers/Plant** to match your hardware

              4. Choose your **Crop Type** (Cannabis_Athena is recommended for Athena nutrients)

              5. Set **Growth Stage** (Vegetative or Generative)

              6. Enable zones you want the AI to control

              7. Turn ON **System Enabled** and **Auto Irrigation**

              8. Watch the system cycle through P0 → P1 → P2 → P3 → P0...

              9. Adjust P1/P2 thresholds based on how your plants respond


              ---


              ## Troubleshooting


              | Problem | Check |
              |---------|-------|
              | Zone not watering | Is it Enabled? Is Manual Override OFF? Is System ON? |
              | Over-watering | Reduce P2 Shot Size, increase P2 VWC Threshold |
              | Under-watering | Increase P1 Target VWC, reduce P2 VWC Threshold |
              | Plants too vegetative | Increase dryback targets, increase EC targets, switch to Generative stage |
              | Plants too generative | Decrease dryback targets, decrease EC targets, switch to Vegetative stage |
              | EC too high | System will auto-flush with larger shots when EC High Ratio exceeded |
              | Sensor showing "degraded" | Check probe connection, may need recalibration |
              | Zone shows "safe" but no water | Check VWC — if above threshold, system is correctly holding |
