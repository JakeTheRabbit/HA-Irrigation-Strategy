        cards:
          - type: entities
            title: "System Health"
            show_header_toggle: false
            entities:
              - entity: sensor.crop_steering_system_health_score
                name: "Health Score"
              - entity: sensor.crop_steering_sensor_health
                name: "Sensor Health"
              - entity: sensor.crop_steering_daily_water_usage
                name: "Water Today (L)"
              - entity: sensor.crop_steering_fused_vwc
                name: "Fused VWC"
              - entity: sensor.crop_steering_fused_ec
                name: "Fused EC"
              - entity: sensor.crop_steering_dryback_percentage
