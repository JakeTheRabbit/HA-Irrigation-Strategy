              - entity: number.p1_shot_size_increment
                name: "Increment %"
              - entity: number.p1_maximum_shot_size
                name: "Max Shot %"
              - entity: number.p1_time_between_shots
                name: "Between Shots (min)"
              - entity: number.p1_minimum_shots
                name: "Min Shots"
              - entity: number.p1_maximum_shots
