              - entity: switch.zone_2_manual_override
                name: "Zone 2"
              - entity: switch.zone_3_manual_override
                name: "Zone 3"
              - entity: switch.zone_4_manual_override
                name: "Zone 4"
              - entity: switch.zone_5_manual_override
                name: "Zone 5"
              - entity: switch.zone_6_manual_override
