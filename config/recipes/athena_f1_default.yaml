# Athena Hybrid — F1 default recipe
# A reasonable starting point for indoor cannabis under HID/LED at the
# F1 install. Operator should tune phase durations and PPFD targets to
# match their actual cultivars + DLI history.
#
# Semantic reminder: dryback values in the linked crop_steering_intent
# field are "% drop from peak VWC" (the controller-wide convention).
# Negative intent = generative bias, positive = vegetative bias.

recipe: athena_f1_default

units:
  temp: c
  rh: pct
  co2: ppm
  vpd: kpa
  ppfd: umol_m2_s

phases:
  # ──────────────────────────────────────────────────────────────────
  - name: "Transplant week 1"
    days: 7
    photoperiod_hours: 18
    crop_steering_intent: 50          # strong vegetative bias — protect young roots
    targets:
      day_temp_c:    {value: 25.0, tolerance: 1.0}
      night_temp_c:  {value: 22.5, tolerance: 1.5}
      day_rh_pct:    {value: 72,   tolerance: 5}
      night_rh_pct:  {value: 68,   tolerance: 5}
      vpd_kpa:       {value: 0.7,  tolerance: 0.2}
      co2_ppm:       {value: 600,  tolerance: 100}
      ppfd_target:   {value: 350,  ramp_minutes: 30}

  # ──────────────────────────────────────────────────────────────────
  - name: "Veg week 2"
    days: 7
    photoperiod_hours: 18
    crop_steering_intent: 30
    targets:
      day_temp_c:    {value: 26.0, tolerance: 1.0}
      night_temp_c:  {value: 23.0, tolerance: 1.5}
      day_rh_pct:    {value: 68,   tolerance: 4}
      night_rh_pct:  {value: 62,   tolerance: 4}
      vpd_kpa:       {value: 0.85, tolerance: 0.15}
      co2_ppm:       {value: 800,  tolerance: 100}
      ppfd_target:   {value: 600,  ramp_minutes: 30}

  - name: "Veg week 3"
    days: 7
    photoperiod_hours: 18
    crop_steering_intent: 20
    targets:
      day_temp_c:    {value: 26.5, tolerance: 1.0}
      night_temp_c:  {value: 23.0, tolerance: 1.5}
      day_rh_pct:    {value: 65,   tolerance: 4}
      night_rh_pct:  {value: 60,   tolerance: 4}
      vpd_kpa:       {value: 0.95, tolerance: 0.15}
      co2_ppm:       {value: 1000, tolerance: 100}
      ppfd_target:   {value: 750,  ramp_minutes: 30}

  # ──────────────────────────────────────────────────────────────────
  # Flip to 12/12
  - name: "Stretch (early flower week 1-2)"
    days: 14
    photoperiod_hours: 12
    crop_steering_intent: -10           # gentle generative bias
    targets:
      day_temp_c:    {value: 26.5, tolerance: 1.0}
      night_temp_c:  {value: 21.5, tolerance: 1.5}
      day_rh_pct:    {value: 60,   tolerance: 4}
      night_rh_pct:  {value: 55,   tolerance: 4}
      vpd_kpa:       {value: 1.10, tolerance: 0.15}
      co2_ppm:       {value: 1200, tolerance: 100}
      ppfd_target:   {value: 850,  ramp_minutes: 45}

  - name: "Mid flower (week 3-5)"
    days: 21
    photoperiod_hours: 12
    crop_steering_intent: -25
    targets:
      day_temp_c:    {value: 26.0, tolerance: 1.0}
      night_temp_c:  {value: 20.5, tolerance: 1.5}
      day_rh_pct:    {value: 55,   tolerance: 4}
      night_rh_pct:  {value: 50,   tolerance: 4}
      vpd_kpa:       {value: 1.20, tolerance: 0.15}
      co2_ppm:       {value: 1300, tolerance: 100}
      ppfd_target:   {value: 950,  ramp_minutes: 45}

  - name: "Late flower (week 6-7)"
    days: 14
    photoperiod_hours: 12
    crop_steering_intent: -40
    targets:
      day_temp_c:    {value: 25.0, tolerance: 1.0}
      night_temp_c:  {value: 19.5, tolerance: 1.5}
      day_rh_pct:    {value: 50,   tolerance: 4}
      night_rh_pct:  {value: 48,   tolerance: 4}
      vpd_kpa:       {value: 1.30, tolerance: 0.15}
      co2_ppm:       {value: 1300, tolerance: 100}
      ppfd_target:   {value: 950,  ramp_minutes: 45}

  - name: "Ripening + flush (week 8-9)"
    days: 14
    photoperiod_hours: 12
    crop_steering_intent: -60
    targets:
      day_temp_c:    {value: 23.0, tolerance: 1.0}
      night_temp_c:  {value: 18.0, tolerance: 1.5}
      day_rh_pct:    {value: 48,   tolerance: 4}
      night_rh_pct:  {value: 45,   tolerance: 4}
      vpd_kpa:       {value: 1.40, tolerance: 0.15}
      co2_ppm:       {value: 600,  tolerance: 100}        # ambient — saving CO2 for ripening
      ppfd_target:   {value: 750,  ramp_minutes: 45}
