# Repo-wide ruff gate. scripts/ are terse local deploy/dev helpers — style
# rules (one-line statements) are intentionally relaxed there; real error
# classes (F, E9, undefined names) still apply everywhere.

[lint.per-file-ignores]
"scripts/*" = ["E701", "E702"]
# the AppDaemon engine + its harness are deployed file-for-file to the live box (same reason
# black is scoped away from them) — the terse one-line style is intentional, real error classes still apply.
"appdaemon/apps/crop_steering/*" = ["E701", "E702", "E402"]
