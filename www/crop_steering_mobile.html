<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0e0f11"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>F2 Steering</title>
<!--
  F2 Crop Steering — mobile-first, FULL functionality (all 5 views, full control surface).
  /config/www/ → http://<HA>:8123/local/crop_steering_mobile.html  · add to home screen.
  Token entered once, stored on-device. No secrets in this file. Dependency-free.
-->
<style>
  :root{--bg:#0e0f11;--bg2:#131517;--card:#1b1d20;--raised:#232629;--br:#2a2d31;--ink:#ECEDEE;--dim:#8B9196;--faint:#5C6166;--accent:#26A69A;--accent-tint:rgba(38,166,154,.14);
    --green:#4CAF50;--cyan:#26A69A;--amber:#FF9F40;--red:#F44336;--blue:#42A5F5;--purple:#7E8AA0;--orange:#FF9F40;
    --t1:#F44336;--t2:#FF9F40;--t3:#FFB020;--t4:#5C6166}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  /* compact sticky header */
  .spine{position:sticky;top:0;z-index:20;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;background:var(--bg2);border-bottom:1px solid var(--br)}
  .srow{display:flex;align-items:center;gap:11px}
  .vword{font-size:30px;font-weight:800;letter-spacing:-.8px;line-height:1;font-variant-numeric:tabular-nums}
  .smeta{flex:1;font-size:11.5px;color:var(--dim);line-height:1.35}.smeta b{color:var(--ink)}
  .armbtn{flex:none;padding:9px 13px;border-radius:11px;font-weight:800;font-size:12.5px;border:1px solid var(--br);min-width:90px;text-align:center}
  .armbtn.armed{background:var(--green);color:#04130c;border-color:transparent}
  .armbtn.disarmed{background:rgba(255,159,64,.12);color:var(--amber);border-color:#FF9F4055}
  .pills{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
  .vp{display:flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;background:var(--raised);border:1px solid var(--br);font-size:11px;font-weight:650}
  .vp .pd{width:8px;height:8px;border-radius:50%}.vp small{color:var(--faint)}
  .trust1{margin-top:8px;font-size:11px;padding:6px 10px;border-radius:9px;background:var(--raised);border:1px solid var(--br)}
  .trust1 b{font-weight:750}

  main{padding:12px 12px 86px;max-width:600px;margin:0 auto}
  section.view{display:none}section.view.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .lead{color:var(--dim);font-size:12.5px;margin:2px 2px 12px}.lead b{color:var(--ink)}
  .sec{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--faint);margin:16px 4px 7px}
  .grid{display:grid;gap:12px;grid-template-columns:1fr}
  .card{background:var(--card);border:1px solid var(--br);border-radius:12px;padding:14px;margin-bottom:12px}
  .card h3{margin:0 0 4px;font-size:12px;letter-spacing:.4px;text-transform:uppercase;color:var(--dim);font-weight:750;display:flex;align-items:center;gap:8px}
  .card .csub{color:var(--faint);font-size:11.5px;margin:0 0 10px}

  /* exceptions */
  .exrow{display:flex;gap:10px;align-items:flex-start;padding:12px 13px;border-radius:13px;background:var(--card);border:1px solid var(--br);border-left-width:4px;margin-bottom:9px}
  .exrow.child{opacity:.5}
  .exrow .ex-b{flex:1;min-width:0}.exrow .ex-t{font-weight:700;font-size:14px;line-height:1.3}.exrow .ex-c{color:var(--dim);font-size:12.5px;margin-top:3px}.exrow .ex-a{color:var(--cyan);font-size:12.5px;margin-top:3px}
  .exrow .ex-tag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:999px;white-space:nowrap;align-self:center}
  .ok-banner{padding:16px;border-radius:14px;background:rgba(76,175,80,.10);border:1px solid #4CAF5044;color:var(--green);font-weight:650;text-align:center}

  /* phase rail + schedule */
  .rail{display:flex;gap:5px;margin:4px 0 12px}
  .rcell{flex:1;text-align:center;padding:8px 2px;border-radius:10px;background:var(--raised);border:1px solid var(--br);font-weight:750;font-size:13px;color:var(--faint)}
  .rcell.on{color:#04130c;background:var(--green);border-color:transparent}
  .rcell .zc{display:flex;gap:3px;justify-content:center;margin-top:4px;min-height:14px;flex-wrap:wrap}
  .zchip{font-size:9px;font-weight:800;padding:1px 5px;border-radius:999px;background:#0008;color:#fff}
  .sched{position:relative;height:40px;border-radius:10px;border:1px solid var(--br);overflow:hidden;background:#0a1120}
  .sched .night{position:absolute;top:0;bottom:0;background:repeating-linear-gradient(45deg,#1a233844,#1a233844 6px,#10182a44 6px,#10182a44 12px)}
  .sched .tick{position:absolute;top:0;bottom:0;width:2px}.sched .lbl{position:absolute;bottom:2px;font-size:9px;color:var(--faint);transform:translateX(-50%)}

  /* metrics + gauges */
  .duo{display:flex;gap:14px}.met{flex:1}
  .met .lab{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
  .met .val{font-size:30px;font-weight:850;letter-spacing:-1px;line-height:1.1}.met .val small{font-size:13px;font-weight:600;color:var(--faint)}
  .met .dev{font-size:11.5px;font-weight:700;margin-top:1px}
  .zhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.zhead .zn{font-weight:800;font-size:16px}.zhead .zs{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  svg.bandgauge{width:100%;height:30px;display:block;margin-top:8px}
  .bg-cap{display:flex;justify-content:space-between;font-size:10.5px;color:var(--faint);margin-top:3px}
  canvas.zspark,canvas.spark{width:100%;height:40px;display:block;margin-top:8px}
  canvas.trace{width:100%;height:280px;display:block}
  .probe{font-size:11px;color:var(--faint);margin-top:7px;display:flex;justify-content:space-between}

  /* uniformity + tiles */
  .spread{height:32px;position:relative;margin:8px 0}
  .tiles{display:grid;grid-template-columns:1fr;gap:10px}
  .tile{background:rgba(255,255,255,.03);border:1px solid var(--br);border-radius:12px;padding:12px;border-top-width:3px}
  .tile .th{font-size:12px;color:var(--dim);font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .tile .ts{font-size:16px;font-weight:750;margin:5px 0}.tile .tx{font-size:11.5px;color:var(--faint);line-height:1.5}
  .hdot{width:9px;height:9px;border-radius:50%}

  /* env */
  .envg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .envt{background:rgba(255,255,255,.03);border:1px solid var(--br);border-radius:12px;padding:11px}
  .envt .l{font-size:11px;color:var(--faint);font-weight:700}.envt .v{font-size:19px;font-weight:800;margin-top:2px}

  /* trace */
  .zsel{display:flex;gap:7px;margin-bottom:10px}
  .zbtn{flex:1;text-align:center;padding:11px;border-radius:11px;border:1px solid var(--br);background:var(--card);color:var(--dim);font-weight:750;font-size:14px}
  .zbtn.on{color:#04130c;background:var(--green);border-color:transparent}

  /* control rows */
  .row{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid rgba(255,255,255,.06)}.row:last-child{border-bottom:none}
  .rl{flex:1;font-size:14px;display:flex;align-items:center;gap:2px;min-width:0}
  .ru{width:42px;font-size:11px;color:var(--faint);text-align:right}
  .ni{width:92px;background:var(--bg2);color:var(--ink);border:1px solid var(--br);border-radius:9px;padding:10px;text-align:right;font-size:15px;font-variant-numeric:tabular-nums}.ni:focus{outline:none;border-color:var(--cyan)}
  select.sel{background:var(--bg2);color:var(--ink);border:1px solid var(--br);border-radius:9px;padding:10px;font-size:14px;max-width:170px}
  .tg{width:50px;height:30px;border-radius:999px;background:#2a3550;position:relative;transition:.2s;border:1px solid var(--br);flex:none}
  .tg::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#8a97b4;transition:.2s}
  .tg.on{background:var(--accent);border-color:var(--accent)}.tg.on::after{left:23px;background:#fff}
  .hi{display:inline-flex;width:15px;height:15px;border-radius:50%;border:1px solid var(--faint);color:var(--faint);font-size:9px;font-style:italic;font-weight:700;align-items:center;justify-content:center;margin-left:6px;flex:none;font-family:Georgia,serif}
  details{margin-bottom:12px}details summary{list-style:none;cursor:pointer;padding:13px 14px;background:var(--card);border:1px solid var(--br);border-radius:14px;font-weight:750;display:flex;align-items:center;gap:8px}
  details summary::-webkit-details-marker{display:none}details summary::before{content:"▸";color:var(--faint)}details[open] summary::before{content:"▾"}
  .ovleg{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px;align-items:center}
  .lgc{cursor:pointer;font-size:10.5px;font-weight:650;color:var(--lc);padding:2px 8px;border-radius:999px;border:1px solid var(--br);user-select:none;white-space:nowrap}
  .lgc.off{color:var(--faint)!important;opacity:.55;text-decoration:line-through}
  details .dbody{padding:6px 2px 0}
  .pillrow{display:flex;gap:8px;flex-wrap:wrap}
  .bigpill{padding:9px 13px;border-radius:11px;background:rgba(255,255,255,.04);border:1px solid var(--br);font-size:14px}.bigpill b{font-weight:800;color:#fff}.bigpill small{color:var(--faint);display:block;font-size:10px;text-transform:uppercase;letter-spacing:.4px}
  .conflict{padding:12px 14px;border-radius:12px;background:rgba(251,146,60,.09);border:1px solid #fb923c55;color:#fdba74;font-size:13px;margin-bottom:12px}
  .override-banner{padding:13px;border-radius:12px;background:rgba(248,113,113,.1);border:1px solid #f8717166;color:#fca5a5;font-weight:700;margin-bottom:12px}
  .notrack{font-size:11.5px;color:var(--faint);background:rgba(255,255,255,.02);border:1px dashed var(--br);border-radius:10px;padding:9px;margin-top:8px}
  .feed{font-size:12px;color:var(--dim);max-height:260px;overflow:auto}.feed div{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)}
  table.kv{width:100%;border-collapse:collapse;font-size:13px}table.kv td{padding:8px 4px;border-bottom:1px solid rgba(255,255,255,.05)}table.kv td:first-child{color:var(--dim)}table.kv td:last-child{text-align:right;font-weight:650;font-variant-numeric:tabular-nums}

  /* bottom nav */
  nav.tabs{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;background:var(--bg2);border-top:1px solid var(--br);padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
  .tab{flex:1;text-align:center;padding:6px 2px;color:var(--faint);font-size:10px;font-weight:700;border-radius:10px}
  .tab .ic{font-size:20px;display:block;line-height:1.2}
  .tab.active{color:var(--green)}
  .tab .cnt{position:absolute;margin:-4px 0 0 8px;font-size:9px;font-weight:800;padding:0 5px;border-radius:999px;background:var(--t1);color:#1b0606}

  #tip{position:fixed;z-index:200;max-width:84vw;background:#0a1326;border:1px solid #2a3a5a;border-radius:11px;padding:11px 13px;font-size:13px;color:var(--ink);box-shadow:0 10px 30px #000a;opacity:0;transition:opacity .15s;pointer-events:none;left:50%;bottom:90px;transform:translateX(-50%)}#tip.show{opacity:1}
  .modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(2,5,12,.78);padding:16px}.modal.open{display:flex}
  .modal .box{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--br);border-radius:18px;padding:22px}
  .modal h2{margin:0 0 4px;font-size:18px}.modal p{margin:0 0 14px;color:var(--dim);font-size:13px}
  .modal label{display:block;font-size:12px;color:var(--dim);margin:12px 0 5px}
  .modal input{width:100%;background:#0a1120;color:var(--ink);border:1px solid var(--br);border-radius:11px;padding:12px;font-size:16px}
  .modal .btn{margin-top:18px;width:100%;padding:13px;border-radius:12px;border:none;background:var(--accent);color:#04130c;font-weight:800;font-size:15px}
  .err{color:var(--red);font-size:12.5px;margin-top:10px;min-height:14px}
  .fab{position:fixed;right:14px;bottom:calc(72px + env(safe-area-inset-bottom));z-index:25}
  .fab button{width:46px;height:46px;border-radius:50%;border:1px solid var(--br);background:var(--card);color:var(--ink);font-size:18px;box-shadow:0 6px 20px #0006}
  .empty{text-align:center;color:var(--faint);padding:50px 20px}
</style>
</head>
<body>
<div class="spine" id="spine"></div>
<main>
  <section class="view active" data-view="now" id="v-now"><div class="empty">connecting…</div></section>
  <section class="view" data-view="trace" id="v-trace"></section>
  <section class="view" data-view="zones" id="v-zones"></section>
  <section class="view" data-view="control" id="v-control"></section>
  <section class="view" data-view="trust" id="v-trust"></section>
</main>
<div class="fab"><button id="refreshBtn">↻</button></div>
<nav class="tabs" id="tabs"></nav>

<div class="modal" id="modal"><div class="box">
  <h2>Connect</h2><p>HA → Profile → Security → Long-lived token. Stored only on this device.</p>
  <label>Home Assistant URL</label><input id="inBase" placeholder="http://192.168.73.250:8123"/>
  <label>Long-lived token</label><input id="inToken" type="password" placeholder="eyJhbGciOi…"/>
  <div class="err" id="modalErr"></div>
  <button class="btn" id="saveBtn">Connect</button>
</div></div>

<script>
"use strict";
/* ============ config / data ============ */
const LS={base:"cs_base",token:"cs_token"};
let CFG={base:localStorage.getItem(LS.base)||location.origin,token:localStorage.getItem(LS.token)||""};
let timer=null,ST={},HIST={},histAt=0,ZONES=[1,2,3],traceZone=1,curView="now",histWindowH=72,OVL_HIDDEN=new Set(),_ovl=null;
const el=id=>document.getElementById(id);
async function api(p,o={}){const r=await fetch(CFG.base.replace(/\/$/,"")+p,{...o,headers:{Authorization:"Bearer "+CFG.token,"Content-Type":"application/json",...(o.headers||{})}});if(!r.ok)throw new Error(r.status+" "+r.statusText);return r.status===200?r.json():null;}
const S=id=>ST[id]?ST[id].state:undefined,N=id=>{const n=parseFloat(S(id));return isNaN(n)?null:n;},A=(id,a)=>ST[id]&&ST[id].attributes?ST[id].attributes[a]:undefined,has=id=>ST[id]!==undefined;
const bad=s=>s==null||s==="unknown"||s==="unavailable"||s==="none"||s==="";
const r1=v=>v==null||isNaN(v)?"—":(Math.round(v*10)/10).toFixed(1),r0=v=>v==null||isNaN(v)?"—":""+Math.round(v);
const armed=()=>S("switch.crop_steering_system_enabled")==="on"&&S("switch.crop_steering_auto_irrigation_enabled")==="on";
const zphase=z=>S(`sensor.crop_steering_zone_${z}_phase`);
function modalPhase(){const ps=ZONES.map(zphase).filter(Boolean);if(!ps.length)return null;const c={};ps.forEach(p=>c[p]=(c[p]||0)+1);return Object.keys(c).sort((a,b)=>c[b]-c[a])[0];}
const ageMin=id=>{const lc=ST[id]&&ST[id].last_changed;return lc?(Date.now()-Date.parse(lc))/60000:null;},fmtAge=m=>m==null?"—":m<1?"now":m<60?Math.round(m)+"m":m<1440?Math.round(m/60)+"h":Math.round(m/1440)+"d";
function ecTarget(z){const ph=(zphase(z)||"P2").replace(/[^0-3]/g,"")||"2",mode=S("select.crop_steering_steering_mode")==="Generative"?"gen":"veg";return N(`number.crop_steering_zone_${z}_ec_target_${mode}_p${ph}`)??N(`number.crop_steering_ec_target_${mode}_p${ph}`)??3.2;}
const C={bg:"#0e0f11",card:"#1b1d20",raised:"#232629",br:"#2a2d31",ink:"#ECEDEE",dim:"#8B9196",accent:"#26A69A",green:"#4CAF50",cyan:"#26A69A",amber:"#FF9F40",red:"#F44336",blue:"#42A5F5",faint:"#5C6166",orange:"#FF9F40",purple:"#7E8AA0"};
const RAW={1:{vwc:"sensor.f2_row_1_vwc",ec:"sensor.f2_row_1_pwec"},2:{vwc:"sensor.veg_sdi12_vwc_2",ec:"sensor.veg_sdi12_ec_2"},3:{vwc:"sensor.veg_sdi12_vwc",ec:"sensor.veg_sdi12_ec"}};
const WATER={ph:"sensor.aquaponics_kit_f4f618_ph",ec:"sensor.atlas_legacy_1_ec"},CLIM={temp:"sensor.veg_scd41_top_temperature_scd41",rh:"sensor.veg_scd41_top_humidity_scd41"};
function airVPD(){const t=N(CLIM.temp),rh=N(CLIM.rh);if(t==null||rh==null)return null;return 0.61078*Math.exp(17.27*t/(t+237.3))*(1-rh/100);}

/* ============ analytics (shared with desktop) ============ */
function trust(){const h=N("sensor.crop_steering_sensor_health"),fc=N("sensor.crop_steering_sensor_fusion_confidence");let v="OK",col=C.green;if(h!=null&&h<40){v="UNTRUSTED";col=C.red;}else if((h!=null&&h<80)||(fc!=null&&fc<0.6)){v="DEGRADED";col=C.amber;}return{v,col,h,fc};}
function uniformity(){const vw=ZONES.map(z=>N(`sensor.crop_steering_zone_${z}_vwc`)).filter(v=>v!=null),ec=ZONES.map(z=>N(`sensor.crop_steering_zone_${z}_ec`)).filter(v=>v!=null);const med=a=>{if(!a.length)return null;const s=[...a].sort((x,y)=>x-y);return s[Math.floor(s.length/2)];};return{nv:vw.length,minVwc:Math.min(...vw),maxVwc:Math.max(...vw),medVwc:med(vw),spreadVwc:vw.length?Math.max(...vw)-Math.min(...vw):0,minEc:Math.min(...ec),maxEc:Math.max(...ec),medEc:med(ec),spreadEc:ec.length?Math.max(...ec)-Math.min(...ec):0};}
function lastLightsOnMs(){const on=N("number.crop_steering_lights_on_hour")??10,d=new Date();d.setMinutes(0,0,0);d.setHours(on);if(d.getTime()>Date.now())d.setDate(d.getDate()-1);return d.getTime();}
function drybackOf(z){const h=HIST[`sensor.crop_steering_zone_${z}_vwc`];if(!h||h.length<3)return null;const w=h.filter(p=>p[0]>=lastLightsOnMs());if(w.length<3)return null;let peak=-1,pt=0;w.forEach(p=>{if(p[1]>peak){peak=p[1];pt=p[0];}});let valley=999;w.forEach(p=>{if(p[0]>=pt&&p[1]<valley)valley=p[1];});const cur=w[w.length-1][1];return peak>0?{peak,pt,valley,cur,pct:(peak-cur)/peak*100,complete:(peak-valley)/peak*100}:null;}
function parseShots(){const raw=A("sensor.crop_steering_activity_log","feed");if(!raw)return[];const now=Date.now(),out=[];String(raw).split("\n").forEach(l=>{const m=l.match(/^(\d\d):(\d\d):(\d\d)\s+Zone (\d)\s+watered\s+(\d+)s(?:\s*\((\d+\.?\d*)% shot\))?/i);if(!m)return;const d=new Date();d.setHours(+m[1],+m[2],+m[3],0);if(d.getTime()>now+60000)d.setDate(d.getDate()-1);out.push({t:d.getTime(),zone:+m[4],dur:+m[5],size:m[6]?+m[6]:null});});return out;}
function exceptions(){const out=[],dataBlind=trust().v==="UNTRUSTED",ecMax=N("number.crop_steering_irrigation_ec_max")??3.5,fc=N("number.crop_steering_field_capacity")??60;
  if(!bad(S("sensor.crop_steering_system_safety_status"))&&S("sensor.crop_steering_system_safety_status")!=="safe")out.push({t:1,title:"Safety fault — engine protective state",cause:"A guardrail or interlock tripped",check:"Control → Guardrails: inspect the tripped limit"});
  ZONES.forEach(z=>{const s=S(`sensor.crop_steering_zone_${z}_safety_status`);if(!bad(s)&&s!=="safe")out.push({t:1,title:`Zone ${z} safety fault`,cause:"Per-zone interlock tripped",check:"Inspect Zone "+z,zone:z});});
  if(dataBlind)out.push({t:1,title:`Sensor health ${r0(N("sensor.crop_steering_sensor_health"))}% — degraded data`,cause:"Probes degraded; fusion filling gaps",check:"Hand-verify with a meter before trusting bands"});
  ZONES.forEach(z=>{const ec=N(`sensor.crop_steering_zone_${z}_ec`),vwc=N(`sensor.crop_steering_zone_${z}_vwc`),floor=N(`number.crop_steering_zone_${z}_p2_vwc_threshold`);
    if(ec!=null&&ec>ecMax)out.push({t:2,title:`Z${z} EC ${r1(ec)} > max ${r1(ecMax)} — salt stacking`,cause:"Insufficient flush / feed EC too high",check:`Flush; target ${r1(ecTarget(z))}`,zone:z,child:dataBlind});

    <div class="card"><h3>Per-signal Liveness</h3><table class="kv">${rows.map(r=>`<tr><td>${r.nm}<span style="color:${C.faint};font-size:11px">${r.note}</span></td><td><span style="color:${r.col}">${r.tag}</span> · ${bad(r.s)?"—":(typeof r.s==="string"?r.s.slice(0,12):r.s)} · ${fmtAge(r.a)}</td></tr>`).join("")}</table></div>`;
}
const RENDER={now:vNow,trace:vTrace,zones:vZones,control:vControl,trust:vTrust};
function renderActive(){RENDER[curView]();}

/* ============ services ============ */
async function svc(d,s,data){try{await api(`/api/services/${d}/${s}`,{method:"POST",body:JSON.stringify(data)});setTimeout(refresh,600);}catch(e){alert("Failed: "+e.message);}}
window.toggleArm=()=>{const want=!armed();if(!confirm((want?"ARM":"DISARM")+" the system?"))return;svc("switch",want?"turn_on":"turn_off",{entity_id:["switch.crop_steering_system_enabled","switch.crop_steering_auto_irrigation_enabled"]});};
window.toggleSw=id=>svc("switch","toggle",{entity_id:id});
window.setSel=(id,v)=>svc(id.split(".")[0],"select_option",{entity_id:id,option:v});
window.setNum=(id,v)=>{if(v!=="")svc("number","set_value",{entity_id:id,value:parseFloat(v)});};
window.setTraceZone=z=>{traceZone=z;vTrace();};

/* ============ tap tooltip ============ */
const tipEl=document.createElement("div");tipEl.id="tip";document.body.appendChild(tipEl);let tipT=null;
document.addEventListener("click",e=>{const t=e.target.closest("[data-tip]");if(!t){tipEl.classList.remove("show");return;}tipEl.textContent=t.getAttribute("data-tip");tipEl.classList.add("show");clearTimeout(tipT);tipT=setTimeout(()=>tipEl.classList.remove("show"),3500);});

/* ============ loop ============ */
async function refresh(){
  if(!CFG.token){openModal();return;}
  try{const states=await api("/api/states");ST={};states.forEach(s=>ST[s.entity_id]=s);
    if(!has("sensor.crop_steering_zone_1_vwc")){el("v-now").innerHTML='<div class="empty">No crop_steering entities found.</div>';return;}
    if(Date.now()-histAt>55000){const ids=ZONES.flatMap(z=>[`sensor.crop_steering_zone_${z}_vwc`,`sensor.crop_steering_zone_${z}_ec`]);try{const start=new Date(Date.now()-(histWindowH+2)*3600*1000).toISOString();const hd=await api(`/api/history/period/${start}?filter_entity_id=${ids.join(",")}&end_time=${new Date().toISOString()}&minimal_response&no_attributes`);HIST={};(hd||[]).forEach(arr=>{if(arr&&arr.length)HIST[arr[0].entity_id]=arr.map(s=>[Date.parse(s.last_changed||s.lu||s.last_updated),parseFloat(s.state)]).filter(p=>!isNaN(p[0])&&!isNaN(p[1]));});histAt=Date.now();}catch(e){}}
    renderSpine();
    const ae=document.activeElement;if(!(ae&&(ae.tagName==="INPUT"||ae.tagName==="SELECT")))renderActive();  // don't clobber an in-progress edit
  }catch(e){if(String(e.message).startsWith("401")){el("modalErr").textContent="Token rejected (401).";openModal();}else el("v-now").innerHTML='<div class="empty">error: '+e.message+'</div>';}
}
function startLoop(){if(timer)clearInterval(timer);refresh();timer=setInterval(refresh,60000);}

/* ============ bottom nav / modal ============ */
const VIEWS=[["now","◆","Now"],["zones","🌱","Zones"],["trace","📈","Graph"],["control","🎛","Control"]];
el("tabs").innerHTML=VIEWS.map((v,i)=>`<div class="tab ${i?"":"active"}" data-t="${v[0]}"><span class="ic">${v[1]}</span>${v[2]}${v[0]==="now"?'<span class="cnt" id="nowBadge" style="display:none"></span>':""}</div>`).join("");
el("tabs").addEventListener("click",e=>{const t=e.target.closest(".tab");if(!t)return;curView=t.dataset.t;document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));t.classList.add("active");document.querySelectorAll(".view").forEach(x=>x.classList.toggle("active",x.dataset.view===curView));renderActive();window.scrollTo(0,0);});
function openModal(){el("inBase").value=CFG.base;el("inToken").value=CFG.token;el("modal").classList.add("open");}
el("refreshBtn").onclick=refresh;
el("saveBtn").onclick=async()=>{const base=el("inBase").value.trim()||location.origin,token=el("inToken").value.trim();el("modalErr").textContent="testing…";try{const r=await fetch(base.replace(/\/$/,"")+"/api/",{headers:{Authorization:"Bearer "+token}});if(!r.ok)throw new Error(r.status);CFG={base,token};localStorage.setItem(LS.base,base);localStorage.setItem(LS.token,token);el("modal").classList.remove("open");startLoop();}catch(e){el("modalErr").textContent="Could not connect ("+e.message+").";}};
addEventListener("resize",()=>{if(curView==="trace"){drawTrace();drawOverlay();}if(curView==="zones")ZONES.forEach(z=>{const cv=el("zspk-"+z);if(cv)spark(cv,HIST[`sensor.crop_steering_zone_${z}_vwc`],C.green);});});
if(!CFG.token)openModal();else startLoop();
</script>
</body>
</html>
